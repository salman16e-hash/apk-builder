name: Build APK (Fixed Gradle Version)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Unzip and Prepare Project
        run: |
          rm -rf app gradle build .gradle build.gradle settings.gradle gradlew* 2>/dev/null || true
          ZIP_FILE=$(ls *.zip | head -1)
          echo "Found ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          if [ -d "extracted/app" ]; then
            cp -r extracted/* .
          else
            cp -r extracted/* .
          fi
          rm -rf extracted "$ZIP_FILE"

      - name: Setup Gradle Wrapper (Correct Version)
        run: |
          # सीधे Gradle 8.0 का Wrapper बनाओ
          gradle wrapper --gradle-version 8.0 --no-daemon
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FolderCam-Manager
          path: app/build/outputs/apk/debug/*.apk
