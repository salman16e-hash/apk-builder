name: Build APK with Gradle 8.0 (Direct)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Download and Setup Gradle 8.0
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          echo "$(pwd)/gradle-8.0/bin" >> $GITHUB_PATH

      - name: Unzip and Prepare Project
        run: |
          rm -rf app gradle build .gradle build.gradle settings.gradle gradlew* 2>/dev/null || true
          ZIP_FILE=$(ls *.zip | head -1)
          echo "Found ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          if [ -d "extracted/app" ]; then
            cp -r extracted/* .
          else
            cp -r extracted/* .
          fi
          rm -rf extracted "$ZIP_FILE"

      - name: Build Debug APK with Gradle 8.0
        run: |
          gradle -v
          gradle assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FolderCam-Manager
          path: app/build/outputs/apk/debug/*.apk
