name: Build APK from ZIP (Fixed - No Compromise)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip and Prepare Project
        run: |
          unzip -q *.zip -d project
          if [ -d "project/app" ]; then
            cp -r project/app/* .
            cp -r project/gradle* . 2>/dev/null || true
            if [ -d "project/gradle" ]; then cp -r project/gradle .; fi
          else
            cp -r project/* .
          fi
          rm -rf project *.zip

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Gradle Wrapper not found. Generating..."
            gradle wrapper --gradle-version 8.0
          else
            chmod +x ./gradlew
          fi

      - name: Build Debug APK with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FolderCam-Manager
          path: app/build/outputs/apk/debug/*.apk
