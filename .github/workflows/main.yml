name: FINAL APK Builder (No Compromise)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Download and Setup Gradle 8.0
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          echo "$(pwd)/gradle-8.0/bin" >> $GITHUB_PATH

      - name: Unzip and Prepare Project
        run: |
          rm -rf app gradle build .gradle build.gradle settings.gradle gradlew* 2>/dev/null || true
          ZIP_FILE=$(ls *.zip | head -1)
          echo "Found ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          if [ -d "extracted/app" ]; then
            cp -r extracted/* .
          else
            cp -r extracted/* .
          fi
          rm -rf extracted "$ZIP_FILE"

      - name: FIX MISSING RESOURCES (Auto-Generate)
        run: |
          # xml फोल्डर बनाओ
          mkdir -p app/src/main/res/xml
          
          # data_extraction_rules.xml बनाओ
          cat > app/src/main/res/xml/data_extraction_rules.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup>
                  <include domain="sharedpref" path="." />
                  <include domain="database" path="." />
                  <include domain="file" path="." />
                  <exclude domain="sharedpref" path="device_prefs.xml" />
              </cloud-backup>
          </data-extraction-rules>
          EOF

          # backup_rules.xml बनाओ
          cat > app/src/main/res/xml/backup_rules.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
              <include domain="sharedpref" path="." />
              <include domain="database" path="." />
              <include domain="file" path="." />
          </full-backup-content>
          EOF

          # डमी लॉन्चर आइकॉन बनाओ (Android Studio डिफ़ॉल्ट इमेज डाउनलोड करके)
          for res in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p app/src/main/res/$res
            curl -sL https://github.com/google/material-design-icons/raw/master/png/android/ic_launcher_round/mipmap-mdpi/ic_launcher_round.png -o app/src/main/res/$res/ic_launcher.png
            curl -sL https://github.com/google/material-design-icons/raw/master/png/android/ic_launcher_round/mipmap-mdpi/ic_launcher_round.png -o app/src/main/res/$res/ic_launcher_round.png
          done

      - name: Build Debug APK with Gradle 8.0
        run: |
          gradle -v
          gradle assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FolderCam-Manager
          path: app/build/outputs/apk/debug/*.apk
