name: Build APK from ZIP (Final - Guaranteed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip and Organize Project
        run: |
          # सबसे पहले कोई भी पुरानी फ़ाइलें हटाओ (रिपो की साफ-सफाई)
          rm -rf app gradle build .gradle build.gradle settings.gradle gradlew* 2>/dev/null || true
          
          # ZIP ढूंढो और अनज़िप करो
          ZIP_FILE=$(ls *.zip | head -1)
          echo "Found ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          
          # अगर ZIP के अंदर app फोल्डर है, तो सब कुछ रूट पर लाओ
          if [ -d "extracted/app" ]; then
            echo "Moving project files to root..."
            cp -r extracted/* .
          else
            echo "Project is already at root level"
            cp -r extracted/* .
          fi
          
          # सफाई
          rm -rf extracted "$ZIP_FILE"

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Generating Gradle Wrapper..."
            gradle wrapper --gradle-version 8.0
          fi
          chmod +x ./gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FolderCam-Manager
          path: app/build/outputs/apk/debug/*.apk
